appId: com.ipodrocks.app
productName: iPodRocks
# Platform icons from buildResources (resources/): icon.ico, icon.icns, icon.png
directories:
  output: out
  buildResources: resources
files:
  - dist/**/*
  - node_modules/**/*
  - package.json
extraResources:
  - from: ffmpeg-bin
    to: ffmpeg
  - from: resources/icon.png
    to: icon.png
  - from: resources/icon.ico
    to: icon.ico
  - from: resources/icon.icns
    to: icon.icns
linux:
  target:
    - AppImage
  category: Audio
mac:
  target:
    - zip
  category: public.app-category.music
win:
  target:
    - portable
