appId: com.ipodrocks.app
productName: iPodRocks
icon: resources/icon.png
directories:
  output: out
  buildResources: resources
files:
  - dist/**/*
  - node_modules/**/*
  - package.json
extraResources:
  - source: ffmpeg-bin/*
    destination: ffmpeg
  - source: resources/icon.png
    destination: icon.png
linux:
  target:
    - AppImage
    - deb
    - rpm
  category: Audio
mac:
  target:
    - dmg
    - zip
  category: public.app-category.music
win:
  target:
    - nsis
    - portable
