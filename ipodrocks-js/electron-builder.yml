appId: com.ipodrocks.app
productName: iPodRocks
icon: resources/icon.png
directories:
  output: out
  buildResources: resources
files:
  - dist/**/*
  - node_modules/**/*
  - package.json
extraResources:
  - from: ffmpeg-bin
    to: ffmpeg
  - from: resources/icon.png
    to: icon.png
linux:
  target:
    - AppImage
  category: Audio
mac:
  target:
    - zip
  category: public.app-category.music
win:
  target:
    - portable
