appId: com.ipodrocks.app
productName: iPodRocks
directories:
  output: out
  buildResources: resources
files:
  - dist/**/*
  - node_modules/**/*
  - package.json
extraResources:
  - source: ffmpeg-bin/*
    destination: ffmpeg
linux:
  target:
    - AppImage
    - deb
    - rpm
  category: Audio
mac:
  target:
    - dmg
    - zip
  category: public.app-category.music
win:
  target:
    - nsis
    - portable
