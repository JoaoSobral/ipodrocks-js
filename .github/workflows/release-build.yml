name: Build desktop packages on release

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build:
    name: Build ${{ matrix.target }} package
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: linux
            dist-script: dist:linux
          - os: macos-latest
            target: mac-arm64
            dist-script: dist:mac
          - os: macos-13
            target: mac-x64
            dist-script: dist:mac:x64
          - os: windows-latest
            target: win
            dist-script: dist:win

    defaults:
      run:
        working-directory: ipodrocks-js

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 25.7.0
          cache: npm
          cache-dependency-path: ipodrocks-js/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test -- --run

      - name: Build ${{ matrix.target }} installer
        run: npm run ${{ matrix.dist-script }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ipodrocks-${{ matrix.target }}-${{ github.ref_name }}
          path: ipodrocks-js/out/
          if-no-files-found: error

      - name: Upload artifacts to GitHub Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ipodrocks-js/out/*.exe
            ipodrocks-js/out/*.AppImage
            ipodrocks-js/out/*.zip
            ipodrocks-js/out/*.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
