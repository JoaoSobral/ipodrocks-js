name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "25.7.0"
          cache: "npm"
          cache-dependency-path: ipodrocks-js/package-lock.json

      - name: Install dependencies
        run: cd ipodrocks-js && npm ci

      - name: Run unit + behavioral + regression tests
        run: cd ipodrocks-js && npm run test -- --run

      - name: Build
        run: cd ipodrocks-js && npm run build

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "25.7.0"
          cache: "npm"
          cache-dependency-path: ipodrocks-js/package-lock.json

      - name: Install dependencies
        run: cd ipodrocks-js && npm ci

      - name: Install Playwright system dependencies
        run: cd ipodrocks-js && npx playwright install-deps

      - name: Build app
        run: cd ipodrocks-js && npm run build

      # Electron on Linux needs a virtual display.
      - name: Run Playwright smoke tests
        run: cd ipodrocks-js && xvfb-run --auto-servernum npx playwright test

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: ipodrocks-js/playwright-report
          retention-days: 7
