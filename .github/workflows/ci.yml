name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: electronjs/package-lock.json

      - name: Install dependencies
        run: cd electronjs && npm ci

      - name: Run tests
        run: cd electronjs && npm run test -- --run

      - name: Build
        run: cd electronjs && npm run build
