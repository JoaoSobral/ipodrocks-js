name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "25.7.0"
          cache: "npm"
          cache-dependency-path: ipodrocks-js/package-lock.json

      - name: Install dependencies
        run: cd ipodrocks-js && npm ci

      - name: Run tests
        run: cd ipodrocks-js && npm run test -- --run

      - name: Build
        run: cd ipodrocks-js && npm run build
